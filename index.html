<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Legions: Imperial Quest</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Serif+SC:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- Overlay UI -->
        <div id="ui-layer">
            <div id="top-bar">
                <div id="level-indicator">⚔️ Nível 1</div>
                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <div id="resources">
                    <div class="resource">
                        <span class="resource-icon">🪙</span>
                        <span id="coin-count">0</span>
                    </div>
                    <div class="resource">
                        <span class="resource-icon">⚡</span>
                        <span id="energy-count">100</span>
                    </div>
                    <div class="resource">
                        <span class="resource-icon">🏹</span>
                        <span id="arrow-count">0</span>
                    </div>
                </div>
            </div>

            <div id="main-menu" class="screen active">
                <div class="menu-decoration">
                    <span class="dragon-left">🐉</span>
                    <span class="dragon-right">🐉</span>
                </div>
                <h1>Operação Cavalo de Troia</h1>
                <p>Comande sua horda, toque duas vezes para atirar e conquiste a vitória!</p>
                <button id="start-btn">INICIAR OPERAÇÃO</button>
            </div>

            <div id="game-over-screen" class="screen">
                <h1 id="end-title">💀 DERROTA 💀</h1>
                <p id="end-message">O Império caiu...</p>
                <div class="stats">
                    <p>Nível: <span id="final-level">1</span></p>
                    <p>Inimigos Abatidos: <span id="final-kills">0</span></p>
                </div>
                <button id="restart-btn">REORGANIZAR TROPAS</button>
            </div>

            <div id="victory-screen" class="screen">
                <div class="menu-decoration">✨ 🏮 ✨</div>
                <h1 class="victory-title">大胜利！</h1>
                <p>Você destruiu a fortaleza inimiga com glória!</p>
                <div class="stats">
                    <p>Moedas ganhas: +<span id="level-coins">0</span></p>
                </div>
                <button id="next-level-btn">AVANÇAR IMPÉRIO</button>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>

</html>
